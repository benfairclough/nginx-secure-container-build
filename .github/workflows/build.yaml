# .github/workflows/build.yml
name: Build & Push to Harbor

on:
  push:
    branches:
      - main        # only build on pushes to main
    paths:
      - 'Dockerfile'
      - 'src/**'    # adjust to wherever your source files live

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.home.ads
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: harbor.home.ads/myproject/myapp:latest